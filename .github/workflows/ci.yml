name: CI

on:
  push:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e . pytest
      - run: pytest -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t safe-test-repair-harness:ci .

  docker-publish:
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - run: docker build -t ghcr.io/alex-guth/coding_agent:latest -t ghcr.io/alex-guth/coding_agent:${{ github.sha }} .
      - run: docker push ghcr.io/alex-guth/coding_agent:latest
      - run: docker push ghcr.io/alex-guth/coding_agent:${{ github.sha }}
